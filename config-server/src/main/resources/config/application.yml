eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Entrega confiable: ack de todos los ISR, idempotencia para no duplicar por reintentos,
      # y reintentos automáticos con backoff en caso de fallos transitorios.
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        retry.backoff.ms: 500
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: alquilaya-group
      # Defensivo: si nadie ha leído, arrancar desde el último mensaje (no reprocesar history).
      auto-offset-reset: latest

server:
  # Permite completar requests en vuelo durante shutdown antes de cerrar el contexto.
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,flyway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
