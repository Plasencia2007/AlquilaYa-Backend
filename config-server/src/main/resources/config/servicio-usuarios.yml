# Configuración para servicio-usuarios
spring:
  application:
    name: servicio-usuarios
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:PLACEHOLDER_SET_ENV_VAR}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 0 # Puerto aleatorio para permitir múltiples instancias si fuera necesario

jwt:
  secret: ${JWT_SECRET:PLACEHOLDER_SET_ENV_VAR}
  expiration: ${JWT_EXPIRATION:86400000}

notification:
  service:
    url: http://localhost:8081
