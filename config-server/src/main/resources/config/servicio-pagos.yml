spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/alquilaya_pagos
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:PLACEHOLDER_SET_ENV_VAR}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:PLACEHOLDER_SET_ENV_VAR}
  public-key: ${MP_PUBLIC_KEY:PLACEHOLDER_SET_ENV_VAR}
  back-urls:
    success: http://localhost:3000/pago/exito
    failure: http://localhost:3000/pago/fallo
    pending: http://localhost:3000/pago/pendiente
  notification-url: ${MP_NOTIFICATION_URL:PLACEHOLDER_SET_ENV_VAR}

server:
  port: 8084
