spring:
  application:
    name: servicio-pagos
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB_PAGOS:alquilaya_pagos}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:oracle123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:APP_USR-7136516795802077-042223-488b9c01408d8fa97435b78322f9b606-3353029523}
  public-key: ${MP_PUBLIC_KEY:APP_USR-685a7b24-b7fd-4f99-b76a-278df847f1d2}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  back-urls:
    success: ${MP_BACK_URL_SUCCESS:http://localhost:3000/pago/exito}
    failure: ${MP_BACK_URL_FAILURE:http://localhost:3000/pago/fallo}
    pending: ${MP_BACK_URL_PENDING:http://localhost:3000/pago/pendiente}
  notification-url: ${MP_NOTIFICATION_URL:https://plop-sabotage-roamer.ngrok-free.dev/api/v1/pagos/webhook}

server:
  port: 8084

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
        loggerLevel: basic

resilience4j:
  circuitbreaker:
    instances:
      servicio-propiedades:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 10
  timelimiter:
    instances:
      servicio-propiedades:
        timeoutDuration: 10s
        cancelRunningFuture: true
