spring:
  cloud:
    gateway:
      routes:
        - id: servicio-usuarios
          uri: lb://servicio-usuarios
          predicates:
            - Path=/usuarios/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
