spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: servicio-usuarios
            uri: lb://servicio-usuarios
            predicates:
              - Path=/api/v1/usuarios/**, /api/v1/auth/**
            filters:
              - StripPrefix=0
          - id: servicio-propiedades
            uri: lb://servicio-propiedades
            predicates:
              - Path=/api/v1/propiedades/**, /api/v1/admin/propiedades/**, /api/v1/reservas/**, /api/v1/favoritos/**, /api/v1/resenas/**
            filters:
              - StripPrefix=0
          - id: servicio-catalogos
            uri: lb://servicio-catalogos
            predicates:
              - Path=/api/v1/catalogos/**
            filters:
              - StripPrefix=0
          - id: servicio-pagos
            uri: lb://servicio-pagos
            predicates:
              - Path=/api/v1/pagos/**
            filters:
              - StripPrefix=0
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "http://localhost:*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
