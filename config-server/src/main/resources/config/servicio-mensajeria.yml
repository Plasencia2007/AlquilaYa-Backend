spring:
  application:
    name: servicio-mensajeria
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB_MENSAJERIA:alquilaya_mensajeria}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:oracle123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  kafka:
    template:
      default-topic: mensajeria-topic

server:
  port: 8086

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
        loggerLevel: basic

resilience4j:
  circuitbreaker:
    instances:
      servicio-usuarios:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 10
      servicio-propiedades:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 10
      obtenerArrendadorMsgCB:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
      obtenerEstudianteMsgCB:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
      obtenerPropiedadMsgCB:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      obtenerArrendadorMsgCB:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - feign.FeignException.NotFound
      obtenerEstudianteMsgCB:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - feign.FeignException.NotFound
      obtenerPropiedadMsgCB:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - feign.FeignException.NotFound
  timelimiter:
    instances:
      servicio-usuarios:
        timeoutDuration: 10s
        cancelRunningFuture: true
      servicio-propiedades:
        timeoutDuration: 10s
        cancelRunningFuture: true
      obtenerArrendadorMsgCB:
        timeoutDuration: 4s
        cancelRunningFuture: true
      obtenerEstudianteMsgCB:
        timeoutDuration: 4s
        cancelRunningFuture: true
      obtenerPropiedadMsgCB:
        timeoutDuration: 4s
        cancelRunningFuture: true
  bulkhead:
    instances:
      obtenerArrendadorMsgCB:
        maxConcurrentCalls: 5
        maxWaitDuration: 100ms
      obtenerEstudianteMsgCB:
        maxConcurrentCalls: 5
        maxWaitDuration: 100ms
      obtenerPropiedadMsgCB:
        maxConcurrentCalls: 5
        maxWaitDuration: 100ms

jwt:
  secret: ${JWT_SECRET:amlob25zLWJha2VuZC1zZWNyZXQta2V5LTIwMjYtYWxxdWlsYXlhLWFwcGxpY2F0aW9u}
  expiration: ${JWT_EXPIRATION:7200000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

mensajeria:
  websocket:
    # Orígenes permitidos para el handshake WebSocket. Misma lista que CORS en prod.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
    endpoint: /ws-mensajeria
