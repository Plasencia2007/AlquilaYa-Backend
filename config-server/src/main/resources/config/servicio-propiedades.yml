# Configuración para el Servicio de Propiedades
spring:
  application:
    name: servicio-propiedades
  datasource:
    url: jdbc:postgresql://localhost:5433/alquilaya_propiedades
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:PLACEHOLDER_SET_ENV_VAR}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    template:
      default-topic: propiedades-topic
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082

# Configuración de Cloudinary (Fase 3 - Real)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:PLACEHOLDER_SET_ENV_VAR}
  api-key: ${CLOUDINARY_API_KEY:PLACEHOLDER_SET_ENV_VAR}
  api-secret: ${CLOUDINARY_API_SECRET:PLACEHOLDER_SET_ENV_VAR}

feign:
  circuitbreaker:
    enabled: true

# Sincronización de Seguridad con Usuarios
jwt:
  secret: ${JWT_SECRET:PLACEHOLDER_SET_ENV_VAR}
  expiration: ${JWT_EXPIRATION:86400000}
