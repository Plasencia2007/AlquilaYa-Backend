# Configuración para el Servicio de Propiedades
spring:
  application:
    name: servicio-propiedades
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB_PROPIEDADES:alquilaya_propiedades}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:oracle123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  kafka:
    template:
      default-topic: propiedades-topic
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082

# Configuración de Cloudinary (Fase 3 - Real)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:ddiyaoxkt}
  api-key: ${CLOUDINARY_API_KEY:387589685746197}
  api-secret: ${CLOUDINARY_API_SECRET:ccDoynk9aR2ibapCNqo6LWxyZao}

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
        loggerLevel: basic

resilience4j:
  circuitbreaker:
    instances:
      servicio-usuarios:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 10
  timelimiter:
    instances:
      servicio-usuarios:
        timeoutDuration: 10s
        cancelRunningFuture: true

