spring.application.name=servicio-usuarios

# Conexión al Config Server
spring.config.import=optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}

# Configuración de carga de archivos (Multipart)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Ubicación de almacenamiento local para documentos
storage.location=uploads/documents
